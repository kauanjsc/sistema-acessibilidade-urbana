<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- viewport com user-scalable=yes garante acessibilidade para zoom (WCAG 1.4.4) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />

    <meta name="theme-color" content="#1351B4" />

    <meta
      name="description"
      content="Teresina Acessível — Mapeamento urbano de acessibilidade para pessoas com deficiência na cidade de Teresina, Piauí."
    />

    <!-- Fonte Rawline do Design System Gov.br -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Rawline:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <!-- Ícone do gov.br (brasão simplificado via emoji SVG) -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♿</text></svg>"
    />

    <title>Teresina Acessível — Mapeamento Urbano de Acessibilidade</title>
  </head>

  <body>
    <!-- skip link: WCAG 2.4.1 — permite pular para o conteúdo principal via teclado -->
    <a href="#main-content" class="skip-link">
      Pular para o conteúdo principal
    </a>

    <!-- aplicação Vue -->
    <div id="app"></div>

    <!-- VLibras — integração oficial gov.br para acessibilidade em Libras -->
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>

    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      new window.VLibras.Widget("https://vlibras.gov.br/app");
    </script>

    <!-- script principal do Vue -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
